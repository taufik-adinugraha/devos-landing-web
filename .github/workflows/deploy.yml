# Generated by DevOS — paste this at .github/workflows/deploy.yml
# Requires repo secret: DEVOS_DEPLOY_SSH_KEY
#   (private key that can SSH into 47.130.108.115 as ec2-user)
#
# On push to main: builds, pushes to GHCR, SSHes to the staging VM,
# runs the container as <slug>-web on the staging-shared network.
# Caddy already routes https://devos-landing.stg.batilabs.ai → that
# container (wildcard *.stg.batilabs.ai with DNS-01).
#
# workflow_dispatch takes an `action` input (deploy | stop | start) —
# DevOS's Stop / Start buttons drive this via GitHub's dispatch API.

name: App Deploy (DevOS-managed)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy | stop | start'
        required: true
        type: choice
        options: [deploy, stop, start]
        default: deploy

concurrency:
  group: app-deploy
  cancel-in-progress: false

env:
  PROJECT_SLUG: devos-landing
  DEPLOY_HOST:  47.130.108.115
  DEPLOY_USER:  ec2-user
  DEPLOY_PORT:  22
  APP_PORT:     3000

jobs:

  build-and-push:
    if: ${{ github.event_name == 'push' || inputs.action == 'deploy' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Image metadata
        id: meta
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=$OWNER" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$OWNER/$PROJECT_SLUG:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/${{ env.PROJECT_SLUG }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy-or-start:
    needs: [build-and-push]
    if: ${{ always() && (github.event_name == 'push' || inputs.action == 'deploy' || inputs.action == 'start') && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve image tag
        id: tag
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/$OWNER/$PROJECT_SLUG:latest"
          if [ "${{ needs.build-and-push.result }}" = "success" ]; then
            IMAGE="${{ needs.build-and-push.outputs.image }}"
          fi
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy / start on staging VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key:  ${{ secrets.DEVOS_DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT }}
          envs: IMAGE,PROJECT_SLUG,APP_PORT,GHCR_TOKEN,GHCR_USER
          script: |
            set -euo pipefail
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull "$IMAGE"
            docker rm -f "${PROJECT_SLUG}-web" 2>/dev/null || true
            docker run -d \
              --name "${PROJECT_SLUG}-web" \
              --network staging-shared \
              --network-alias "${PROJECT_SLUG}-web" \
              --restart unless-stopped \
              -e PORT=$APP_PORT \
              "$IMAGE"
        env:
          IMAGE:      ${{ steps.tag.outputs.image }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER:  ${{ github.actor }}

  stop:
    if: ${{ inputs.action == 'stop' }}
    runs-on: ubuntu-latest
    steps:
      - name: Stop container on staging VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key:  ${{ secrets.DEVOS_DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT }}
          envs: PROJECT_SLUG
          script: |
            set -euo pipefail
            docker rm -f "${PROJECT_SLUG}-web" 2>/dev/null || true
