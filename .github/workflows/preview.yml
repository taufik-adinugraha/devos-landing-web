# Generated by DevOS — per-branch staging preview.
# Builds the branch and runs it as <slot>-web on the staging VM.
# Caddy already routes <slot>.stg.batilabs.ai → <slot>-web:3000
# via the staging-shared Docker network.
# Required secrets: DEVOS_DEPLOY_SSH_KEY (same as deploy.yml).

name: Preview Deploy (DevOS-managed)

on:
  push:
    branches-ignore: [main]

concurrency:
  group: preview-${{ github.ref_name }}
  cancel-in-progress: true

env:
  DEPLOY_HOST: ec2-47-130-108-115.ap-southeast-1.compute.amazonaws.com
  DEPLOY_USER: ec2-user
  DEPLOY_PORT: 22
  APP_PORT:    3000

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute slot name
        id: slot
        run: |
          # Slot = "branch-" + branch with / and weird chars stripped.
          # Caddy routes <slot>.stg.batilabs.ai → <slot>-web:3000 so
          # the slot must be a valid DNS label.
          SLOT="branch-$(echo '${{ github.ref_name }}' | tr '/' '-' | tr -cd '[:alnum:]-' | tr '[:upper:]' '[:lower:]')"
          SLOT="${SLOT:0:50}"
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"

      - name: Image metadata
        id: meta
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          REPO=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/$OWNER/$REPO-preview:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Deploy preview on staging VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key:  ${{ secrets.DEVOS_DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT }}
          envs: IMAGE,SLOT,APP_PORT,GHCR_TOKEN,GHCR_USER
          script: |
            set -euo pipefail
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull "$IMAGE"
            docker rm -f "${SLOT}-web" 2>/dev/null || true
            docker run -d \
              --name "${SLOT}-web" \
              --network staging-shared \
              --network-alias "${SLOT}-web" \
              --restart unless-stopped \
              -e PORT=$APP_PORT \
              "$IMAGE"
        env:
          IMAGE:      ${{ steps.meta.outputs.image }}
          SLOT:       ${{ steps.slot.outputs.slot }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER:  ${{ github.actor }}
